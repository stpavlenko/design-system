name: Visual Regression Tests (Testplane)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-tests:
    name: Testplane Visual Snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Generate visual snapshots
        run: npx testplane --storybook --update-refs

      - name: Upload Testplane report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testplane-report
          path: testplane/reports/
          retention-days: 14

      - name: Upload visual snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: src/components/*/screens/
          retention-days: 14
